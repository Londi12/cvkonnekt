<body>
  <div id="root">
    <div id="loading-indicator" class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-700">Loading Resume Builder...</h2>
        <p class="text-gray-500">Please wait while we prepare the application.</p>
      </div>
    </div>
  </div>

  <!-- Error handling -->
  <script>
    console.log('Initializing CVKonnekt Resume Builder...');
    
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('Global error caught:', error);
      console.error('Message:', msg);
      console.error('URL:', url);
      console.error('Line:', lineNo, 'Column:', columnNo);
      console.error('Stack:', error?.stack);
      
      // Show error in the loading indicator
      const loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.innerHTML = `
          <div style="color: #721c24; background-color: #f8d7da; padding: 20px; border-radius: 5px; max-width: 80%;">
            <h2>Something went wrong</h2>
            <p>We encountered an error while loading the application.</p>
            <p>Error: ${msg}</p>
            <p>Location: ${url} (line ${lineNo}, column ${columnNo})</p>
            <p>Please try refreshing the page.</p>
            <button onclick="location.reload()" style="background-color: #0056b3; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">Refresh Page</button>
          </div>
        `;
      }
      
      return false;
    };
    
    // Add unhandled promise rejection handler
    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled Promise Rejection:', event.reason);
      
      // You could also update the UI here to show the error
    });
  </script>
