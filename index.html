<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV Builder for South Africans - Create professional resumes easily" />
    <meta name="theme-color" content="#ffffff" />
    <title>CVKonnekt - Professional CV Builder</title>
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="CVKonnekt - Professional CV Builder" />
    <meta property="og:description" content="Create professional resumes easily with CVKonnekt" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cvkonnekt.com" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  </head>
  <body>
    <div id="root">
      <div id="loading-indicator" class="flex items-center justify-center min-h-screen">
        <div class="text-center">
          <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-600 mx-auto mb-4"></div>
          <h2 class="text-xl font-semibold text-gray-700">Loading Resume Builder...</h2>
          <p class="text-gray-500">Please wait while we prepare the application.</p>
        </div>
      </div>
    </div>
    <noscript>
      <div style="text-align: center; padding: 20px;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use CVKonnekt.</p>
      </div>
    </noscript>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
